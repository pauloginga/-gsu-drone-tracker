{% extends "base.html" %}
{% block title %}Register — GSU/CIS Drone Tracker{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1>Pilot Registration</h1>
        <p class="auth-sub">Your account will need admin approval before you can log in.</p>

        <form method="POST" action="{{ url_for('register') }}">
            <div class="field">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            <div class="field">
                <label for="service_number">Service Number</label>
                <input type="text" id="service_number" name="service_number" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="field">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <button type="submit">Submit Registration</button>
        </form>

        <div class="auth-switch">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </div>
    </div>
</div>
{% endblock %}
