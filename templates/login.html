{% extends "base.html" %}
{% block title %}Log In — GSU/CIS Drone Tracker{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1>Sign in</h1>
        <p class="auth-sub">GSU/CIS Drone Tracker</p>

        <form method="POST" action="{{ url_for('login') }}">
            <div class="field">
                <label for="identifier">Email or Service Number</label>
                <input type="text" id="identifier" name="identifier" required autofocus>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit">Log In</button>
        </form>

        <div class="auth-switch">
            New pilot/operator? <a href="{{ url_for('register') }}">Register here</a>
        </div>
        <div class="auth-switch" style="margin-top: 6px; font-size: 0.75rem;">
            <a href="{{ url_for('admin_register') }}">Supervisor/Admin registration</a>
        </div>
    </div>
</div>
{% endblock %}
