{% extends "base.html" %}
{% block title %}Admin Registration — GSU/CIS Drone Tracker{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h1>Supervisor / Admin Registration</h1>
        <p class="auth-sub">Requires the admin setup code. Contact whoever manages this system if you don't have it.</p>

        <form method="POST" action="{{ url_for('admin_register') }}">
            <div class="field">
                <label for="full_name">Full Name</label>
                <input type="text" id="full_name" name="full_name" required>
            </div>
            <div class="field">
                <label for="service_number">Service Number</label>
                <input type="text" id="service_number" name="service_number" required>
            </div>
            <div class="field">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            <div class="field">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="field">
                <label for="confirm_password">Confirm Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>
            <div class="field">
                <label for="setup_code">Admin Setup Code</label>
                <input type="password" id="setup_code" name="setup_code" required>
            </div>
            <button type="submit">Create Admin Account</button>
        </form>

        <div class="auth-switch">
            <a href="{{ url_for('login') }}">Back to log in</a>
        </div>
    </div>
</div>
{% endblock %}
